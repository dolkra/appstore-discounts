# Cloudflare Worker + Static Assets 配置
#
# 部署方式：在项目根目录（即 src/web/）运行 `wrangler deploy`
# 静态资源（dist/）通过 [assets] 自动托管；API 由 worker/index.ts 处理
name = "appstore-discounts"
main = "worker/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
# 构建产物目录
directory = "./dist"
# 在 Worker 中通过 env.ASSETS 访问静态资源
binding = "ASSETS"
# SPA 模式：未命中静态资源时回落到 index.html，由 React Router 接管路由
not_found_handling = "single-page-application"
# /api/* 路径不走静态资源，统一交给 Worker 的 fetch 处理
run_worker_first = ["/api/*"]
